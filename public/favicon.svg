<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- High-end gradient matching the uploaded logo: soft sky blue to vibrant lavender purple -->
    <linearGradient id="uploaded-logo-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#73c5ff" />
      <stop offset="42%" stop-color="#9d8eff" />
      <stop offset="100%" stop-color="#bd53ff" />
    </linearGradient>
  </defs>

  <!-- Solid rounded rectangle frame mapping to the beautiful squircle capsule look -->
  <rect x="24" y="24" width="464" height="464" rx="116" fill="url(#uploaded-logo-gradient)" />

  <!-- Precise geometric bold "Y" vector monogram centered beautifully -->
  <path 
    d="M 148 135 L 206 135 L 256 208 L 306 135 L 364 135 L 284 252 L 284 385 L 228 385 L 228 252 Z" 
    fill="#131317" 
    stroke="#131317"
    stroke-width="2"
    stroke-linejoin="round"
  />
</svg>
